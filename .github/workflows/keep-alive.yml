name: Daily Repo Keep-Alive

on:
  schedule:
    - cron: '0 0 * * *'  # ยิงวันละครั้งตอนเที่ยงคืนเป๊ะ (เวลา UTC)
  workflow_dispatch:     # ยังเก็บปุ่มกดรันเองเอาไว้เผื่ออยากเทสต์

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-commit to keep repo active
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          date +%F > keepalive-vercel.txt
          git add keepalive-vercel.txt
          git commit -m "Daily keep-alive update" || exit 0
          git push --force
