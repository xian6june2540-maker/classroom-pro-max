name: 24/7 Wake Up Vercel

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Vercel
        run: curl -s https://classroom-pro-max.vercel.app/api/cron

      - name: Auto-commit to keep repo active
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          date +%F > keepalive-vercel.txt
          git add keepalive-vercel.txt
          git commit -m "Auto update to prevent GitHub Actions from pausing" || exit 0
          git push --force
